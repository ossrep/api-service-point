quarkus:
  banner:
    enabled: false
  application:
    name: api-service-point
  http:
    port: 8080
  datasource:
    db-kind: postgresql
  hibernate-orm:
    schema-management:
      strategy: none
  flyway:
    migrate-at-start: true
    locations: db/migration
  oidc:
    auth-server-url: ${OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/ossrep}
    client-id: ${OIDC_CLIENT_ID:api-service-point}

app:
  role-mapping:
    centerpoint-service-point-admin: admin
    centerpoint-service-point-user: user
    exarep-service-point-admin: admin
  ercot:
    auth-url: ${ERCOT_AUTH_URL:https://ercotb2c.b2clogin.com/ercotb2c.onmicrosoft.com/B2C_1_PUBAPI-ROPC-FLOW/oauth2/v2.0/token}
    username: ${ERCOT_USERNAME:}
    password: ${ERCOT_PASSWORD:}
    subscription-key: ${ERCOT_SUBSCRIPTION_KEY:}
    archive-url: ${ERCOT_ARCHIVE_URL:https://api.ercot.com/api/public-reports/archive/ZP15-612}
    cron: "0 30 6 * * ?"
    enabled: ${ERCOT_INGESTION_ENABLED:false}

mp:
  messaging:
    outgoing:
      service-point-events:
        connector: smallrye-kafka
        topic: service-point-events
        value:
          serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer

kafka:
  bootstrap:
    servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

"%dev":
  quarkus:
    hibernate-orm:
      log:
        sql: true
    flyway:
      locations: db/migration,db/testdata
    datasource:
      devservices:
        port: 5430
    oidc:
      devservices:
        enabled: true

"%test":
  quarkus:
    flyway:
      locations: db/migration,db/testdata

"%prod":
  quarkus:
    datasource:
      jdbc:
        url: ${DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/servicepoint}
      username: ${DATASOURCE_USERNAME:servicepoint}
      password: ${DATASOURCE_PASSWORD:servicepoint}
    flyway:
      locations: db/migration
